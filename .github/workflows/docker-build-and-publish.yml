name: Container Images

on:
  pull_request:
    paths:
      - ".github/workflows/docker-build-and-publish.yml"
      - "7zip/**"
      - "unarr/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-build-and-publish.yml"
      - "7zip/**"
      - "unarr/**"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: "Push images to GHCR"
        required: false
        default: false
        type: boolean

concurrency:
  group: container-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.variant }} (${{ matrix.arch_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: unarr
            arch_name: amd64
            arch_tag: amd64
            platform: linux/amd64
            context: unarr
            dockerfile: unarr/Dockerfile
          # - variant: unarr
          #   arch_name: arm64
          #   arch_tag: arm64v8
          #   platform: linux/arm64/v8
          #   context: unarr
          #   dockerfile: unarr/Dockerfile.aarch64
          - variant: 7zip
            arch_name: amd64
            arch_tag: amd64
            platform: linux/amd64
            context: 7zip
            dockerfile: 7zip/Dockerfile
          # - variant: 7zip
          #   arch_name: arm64
          #   arch_tag: arm64v8
          #   platform: linux/arm64/v8
          #   context: 7zip
          #   dockerfile: 7zip/Dockerfile.aarch64
    env:
      SHOULD_PUSH: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch_name == 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare tags
        id: prep
        run: |
          tags="${GHCR_IMAGE}:${{ matrix.variant }}-${{ matrix.arch_tag }}"
          if [ "${{ matrix.variant }}" = "unarr" ]; then
            tags="${tags}"$'\n'"${GHCR_IMAGE}:latest-${{ matrix.arch_tag }}"
          fi

          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$tags" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          provenance: false
          push: ${{ env.SHOULD_PUSH == 'true' }}
          tags: ${{ steps.prep.outputs.tags }}

  publish-manifests:
    name: Publish manifests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish manifests
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          docker buildx imagetools create \
            -t "${GHCR_IMAGE}:unarr" \
            -t "${GHCR_IMAGE}:latest" \
            "${GHCR_IMAGE}:unarr-amd64"
            # "${GHCR_IMAGE}:unarr-arm64v8"

          docker buildx imagetools create \
            -t "${GHCR_IMAGE}:7zip" \
            "${GHCR_IMAGE}:7zip-amd64"
            # "${GHCR_IMAGE}:7zip-arm64v8"

          if [ -n "${RELEASE_TAG}" ]; then
            docker buildx imagetools create \
              -t "${GHCR_IMAGE}:${RELEASE_TAG}" \
              -t "${GHCR_IMAGE}:${RELEASE_TAG}-unarr" \
              "${GHCR_IMAGE}:unarr-amd64"
              # "${GHCR_IMAGE}:unarr-arm64v8"

            docker buildx imagetools create \
              -t "${GHCR_IMAGE}:${RELEASE_TAG}-7zip" \
              "${GHCR_IMAGE}:7zip-amd64"
              # "${GHCR_IMAGE}:7zip-arm64v8"
          fi
